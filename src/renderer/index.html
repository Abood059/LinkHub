<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkHub - إدارة الأجهزة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-area">
                <h1>LinkHub</h1>
                <span class="badge">v1.0.0</span>
            </div>
            <p class="subtitle">إدارة وبث شاشة أجهزة أندرويد بكل سهولة</p>
        </header>

        <section class="device-section">
            <div class="section-header">
                <h2 class="section-title">الأجهزة المسجلة</h2>
                <span class="count-badge" id="reg-count">0</span>
            </div>
            <div id="registered-list" class="device-grid">
                </div>
        </section>

        <div class="divider"></div>

        <section class="device-section">
            <div class="section-header">
                <h2 class="section-title">الرادار (أجهزة لاسلكية مكتشفة)</h2>
                <span class="count-badge radar-count" id="disc-count">0</span>
            </div>
            <div id="unregistered-list" class="device-grid">
                </div>
        </section>
    </div>

    <div id="pairing-modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">🔑</div>
            <h3>إقران لاسلكي آمن</h3>
            <p>أدخل رمز الإقران المكون من 6 أرقام والموجود في "خيارات المطور" على هاتفك.</p>
            
            <input type="text" id="pairing-code" placeholder="000000" maxlength="6">
            
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="submitPairing()">تأكيد الإقران</button>
                <button class="btn btn-secondary" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script src="renderer.js"></script>
</body>
</html>
